    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-secondary: #888888;
            --yugra-logo-green: #00ff00; /* Зеленый в логотипе */
            --yugra-logo-blue: #0079c1;  /* Синий в логотипе */
            
            --apple-bg: #1a1a1a;       /* Темный фон для Apple */
            --android-green: #3DDC84;   /* Официальный зеленый Android */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            padding: 30px 20px;
            border: 1px solid #222;
            border-radius: 24px;
            background: var(--container-bg);
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .yugra { color: var(--yugra-logo-green); }
        .online { color: var(--yugra-logo-blue); }
        
        .description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* Общие стили кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            padding: 16px 20px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            border: 1px solid transparent;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        /* Эффект нажатия */
        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Иконки внутри кнопок */
        .btn svg {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            fill: currentColor; /* Цвет иконки как у текста */
        }

        /* Кнопка для iOS (Apple) */
        .btn-apple {
            background-color: var(--apple-bg);
            color: white;
            border-color: #333;
        }
        .btn-apple:hover {
            background-color: #222;
        }

        /* Кнопка для Android + Windows (ТЕПЕРЬ ЗЕЛЕНАЯ) */
        .btn-multi {
            background-color: var(--android-green);
            color: #000000; /* Черный текст для лучшей читаемости на зеленом */
        }
        .btn-multi:hover {
            background-color: #32c675;
        }
        /* Убираем отступ у второй иконки */
        .btn-multi svg.win-icon {
            margin-left: -4px;
            margin-right: 12px;
        }

    </style>
</head>
